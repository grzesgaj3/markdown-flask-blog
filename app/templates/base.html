<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Flask R Markdown Blog{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}A production-ready Flask blog powered by R Markdown.{% endblock %}" />
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <!-- Pygments code highlight -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pygments.css') }}" />
  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('blog.index') }}">📝 R Markdown Blog</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('blog.index') }}">Strona główna</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('blog.about') }}">O blogu</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-5 py-4 bg-light border-top">
    <div class="container text-center text-muted small">
      &copy; {{ now.year if now is defined else "2025" }} R Markdown Blog &mdash; napędzany przez
      <a href="https://flask.palletsprojects.com/" rel="noopener noreferrer" target="_blank">Flask</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb"
          crossorigin="anonymous"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
